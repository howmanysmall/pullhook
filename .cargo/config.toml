[build]
# Incremental compilation disabled for more stable cache behavior across environments.
incremental = false

[profile.dev]
# Faster debug builds with limited opt for dependencies
opt-level = 0
debug = true

[profile.release]
# Production builds with maximum optimization
opt-level = 3
lto = "thin"
codegen-units = 1
strip = true
panic = "abort"

[profile.dist]
# Profile for cargo-dist releases (inherits from release in Cargo.toml)
# Additional optimization already defined in Cargo.toml

[net]
# Prefer vendored OpenSSL for consistent builds
git-fetch-with-cli = false
