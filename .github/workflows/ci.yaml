name: CI

on:
    push:
        branches: [main]
    pull_request:
    merge_group:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    RUST_BACKTRACE: 1
    CARGO_TERM_COLOR: always
    CARGO_INCREMENTAL: 0
    RUSTC_WRAPPER: sccache
    SCCACHE_GHA_ENABLED: "true"

jobs:
    # Check code formatting
    fmt:
        name: Format
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: "1.93.1"
                  components: rustfmt
            - run: cargo fmt --all --check

    # Run Clippy lints
    clippy:
        name: Clippy
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: "1.93.1"
                  components: clippy
            - uses: mozilla-actions/sccache-action@v0.0.9
            - uses: Swatinem/rust-cache@v2
            - run: cargo clippy --all-targets --all-features -- -D warnings

    # Run tests with nextest
    test:
        name: Tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: "1.93.1"
            - uses: mozilla-actions/sccache-action@v0.0.9
            - uses: Swatinem/rust-cache@v2
            - name: Install cargo-binstall
              uses: cargo-bins/cargo-binstall@main
            - name: Install cargo-nextest
              run: cargo binstall --no-confirm cargo-nextest@0.9.129
            - run: cargo nextest run --all-targets --all-features

    # Security audit
    audit:
        name: Security Audit
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: rustsec/audit-check@v2
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}

    # Dependency policy enforcement
    deny:
        name: Dependency Policy (cargo-deny)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: "1.93.1"
            - uses: mozilla-actions/sccache-action@v0.0.9
            - uses: Swatinem/rust-cache@v2
            - name: Install cargo-binstall
              uses: cargo-bins/cargo-binstall@main
            - name: Install cargo-deny
              run: cargo binstall --no-confirm cargo-deny@0.19.0
            - run: cargo deny check

    # Dead code detection
    shear:
        name: Dead Code (cargo-shear)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: "1.93.1"
            - uses: mozilla-actions/sccache-action@v0.0.9
            - uses: Swatinem/rust-cache@v2
            - name: Install cargo-binstall
              uses: cargo-bins/cargo-binstall@main
            - name: Install cargo-shear
              run: cargo binstall --no-confirm cargo-shear@1.9.1
            - run: cargo shear

    # Secret scanning
    gitleaks:
        name: Secret Scanning (gitleaks)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - uses: gitleaks/gitleaks-action@v2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Documentation linting
    docs:
        name: Documentation
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: "1.93.1"
            - uses: mozilla-actions/sccache-action@v0.0.9
            - uses: Swatinem/rust-cache@v2
            - name: Check Rust docs
              run: cargo doc --no-deps --document-private-items --all-features
              env:
                  RUSTDOCFLAGS: "-D warnings"

    # Informational: Binary size analysis
    bloat:
        name: Binary Size (cargo-bloat)
        runs-on: ubuntu-latest
        if: github.event_name == 'pull_request'
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: "1.93.1"
            - uses: mozilla-actions/sccache-action@v0.0.9
            - uses: Swatinem/rust-cache@v2
            - name: Install cargo-binstall
              uses: cargo-bins/cargo-binstall@main
            - name: Install cargo-bloat
              run: cargo binstall --no-confirm cargo-bloat@0.12.1
            - name: Build release binary
              run: cargo build --release
            - name: Analyze binary size
              run: cargo bloat --release --crates
              continue-on-error: true

    # Informational: Cross-compilation smoke test
    zigbuild:
        name: Zig Cross-compile
        runs-on: ubuntu-latest
        if: github.event_name == 'pull_request'
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: "1.93.1"
            - uses: mozilla-actions/sccache-action@v0.0.9
            - uses: Swatinem/rust-cache@v2
            - name: Install cargo-binstall
              uses: cargo-bins/cargo-binstall@main
            - name: Install cargo-zigbuild
              run: cargo binstall --no-confirm cargo-zigbuild@0.22.1
            - name: Install Zig
              uses: goto-bus-stop/setup-zig@v2
              with:
                  version: 0.13.0
            - name: Smoke test x86_64-unknown-linux-gnu
              run: cargo zigbuild --target x86_64-unknown-linux-gnu
              continue-on-error: true

    # Summary job - all required checks must pass
    ci-success:
        name: CI Success
        runs-on: ubuntu-latest
        if: always()
        needs: [fmt, clippy, test, audit, deny, shear, gitleaks, docs]
        steps:
            - name: Check all required jobs
              run: |
                  if [[ "${{ needs.fmt.result }}" != "success" || \
                        "${{ needs.clippy.result }}" != "success" || \
                        "${{ needs.test.result }}" != "success" || \
                        "${{ needs.audit.result }}" != "success" || \
                        "${{ needs.deny.result }}" != "success" || \
                        "${{ needs.shear.result }}" != "success" || \
                        "${{ needs.gitleaks.result }}" != "success" || \
                        "${{ needs.docs.result }}" != "success" ]]; then
                    echo "One or more required jobs failed"
                    exit 1
                  fi
                  echo "All required CI checks passed!"
